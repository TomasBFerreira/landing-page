<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Landing Page</title>
    <style>
        body {
            background: #23272a;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #2c2f33;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37);
            padding: 48px 32px;
            text-align: center;
        }
        h1 {
            color: #ff8800;
            font-size: 3rem;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }
        p {
            color: #cccccc;
            font-size: 1.25rem;
            margin-bottom: 32px;
        }
        .accent-btn {
            background: linear-gradient(90deg, #ff8800 0%, #ffb347 100%);
            color: #23272a;
            border: none;
            border-radius: 8px;
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .accent-btn:hover {
            background: linear-gradient(90deg, #ffb347 0%, #ff8800 100%);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello, World!</h1>
        <p>Welcome to your new landing page project. This page uses a dark theme with orange accents for a modern look.</p>
        <button class="accent-btn">Get Started</button>
    </div>
</body>
</html>
