apiVersion: apps/v1
kind: Deployment
metadata:
  name: directus
  namespace: databaes-directus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: directus
  template:
    metadata:
      labels:
        app: directus
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: directus
          image: directus/directus:11
          ports:
            - containerPort: 8055
          env:
            - name: KEY
              valueFrom:
                secretKeyRef:
                  name: directus-secrets
                  key: app-key
            - name: SECRET
              valueFrom:
                secretKeyRef:
                  name: directus-secrets
                  key: app-secret
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: directus-secrets
                  key: admin-email
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: directus-secrets
                  key: admin-password
            - name: DB_CLIENT
              value: pg
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: directus-secrets
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: directus-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: directus-secrets
                  key: db-pass
            - name: PUBLIC_URL
              value: https://cms.databaes.net
            # CORS so the databaes.net landing page can read collections at
            # runtime without a proxy. Writes require an auth'd session so this
            # is read-only safe.
            - name: CORS_ENABLED
              value: "true"
            - name: CORS_ORIGIN
              value: https://databaes.net,https://www.databaes.net,https://databaes-landing-page.databaes.net,https://databaes-landing-page-dev.databaes.net
            - name: CORS_METHODS
              value: GET,OPTIONS
            - name: CORS_CREDENTIALS
              value: "false"
            - name: STORAGE_LOCATIONS
              value: local
            - name: STORAGE_LOCAL_DRIVER
              value: local
            - name: STORAGE_LOCAL_ROOT
              value: /directus/uploads
            # LP-F10: Authentik OIDC — single sign-on for the Directus admin
            # UI. Provider + client credentials are provisioned in
            # infra-platform's sso_setup.yml; this pod reads them from the
            # `directus-secrets` k8s Secret (seeded by deploy-directus.yml
            # from Vault `secret/authentik/<env>/directus-oidc`).
            # Users still see the local admin login as a fallback.
            - name: AUTH_PROVIDERS
              value: oidc
            - name: AUTH_OIDC_DRIVER
              value: openid
            - name: AUTH_OIDC_LABEL
              value: Sign in with Authentik
            - name: AUTH_OIDC_ICON
              value: lock
            - name: AUTH_OIDC_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: directus-secrets
                  key: oidc-discovery-url
            - name: AUTH_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: directus-secrets
                  key: oidc-client-id
            - name: AUTH_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: directus-secrets
                  key: oidc-client-secret
            - name: AUTH_OIDC_IDENTIFIER_KEY
              value: email
            - name: AUTH_OIDC_EMAIL_KEY
              value: email
            - name: AUTH_OIDC_ALLOW_PUBLIC_REGISTRATION
              value: "false"
          volumeMounts:
            - name: uploads
              mountPath: /directus/uploads
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /server/health
              port: 8055
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /server/health
              port: 8055
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: directus-uploads-pvc
