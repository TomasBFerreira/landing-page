apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# secret-gen: the deploy pipeline writes a manifest containing the Vault-sourced
# values before kubectl apply. This placeholder keeps kustomize happy locally.
secretGenerator:
  - name: directus-secrets
    namespace: databaes-directus
    literals:
      - db-name=directus
      - db-user=directus
      - db-pass=PLACEHOLDER
      - app-key=PLACEHOLDER
      - app-secret=PLACEHOLDER
      - admin-email=admin@databaes.net
      - admin-password=PLACEHOLDER
    options:
      disableNameSuffixHash: true
