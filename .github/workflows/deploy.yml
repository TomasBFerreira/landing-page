name: Deploy databaes-landing-page

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      env:
        type: choice
        options: [dev, prod]
        default: dev
      worker_node_ip:
        required: false
        description: Override worker node IP (leave blank to resolve from Vault)

env:
  SERVICE: databaes-landing-page
  IMAGE: ghcr.io/tomasbferreira/databaes-landing-page
  PORT: "30080"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/tomasbferreira/databaes-landing-page:${{ github.sha }}
            ghcr.io/tomasbferreira/databaes-landing-page:latest

  deploy:
    needs: [build-and-push]
    runs-on: ${{ fromJSON(github.event_name == 'push' && '["self-hosted","dev"]' || format('["self-hosted","{0}"]', inputs.env)) }}
    permissions:
      contents: read
      packages: read
    outputs:
      worker_ip: ${{ steps.resolve-ip.outputs.worker_ip }}
    env:
      ENV: ${{ github.event_name == 'push' && 'dev' || inputs.env }}
    steps:
      - uses: actions/checkout@v4

      - name: Normalise Vault address
        run: |
          VAULT_ADDR="${{ secrets.VAULT_BOOTSTRAP_ADDR }}"
          VAULT_ADDR="${VAULT_ADDR%/}"
          echo "VAULT_ADDR=$VAULT_ADDR" >> $GITHUB_ENV

      - name: Validate Vault token
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "X-Vault-Token: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}" \
            "$VAULT_ADDR/v1/auth/token/lookup-self")
          [ "$STATUS" = "200" ] || { echo "Vault token invalid (HTTP $STATUS)"; exit 1; }

      - name: Resolve worker-node IP
        id: resolve-ip
        run: |
          if [ -n "${{ inputs.worker_node_ip }}" ]; then
            WORKER_IP="${{ inputs.worker_node_ip }}"
          else
            WORKER_IP=$(curl -sf \
              -H "X-Vault-Token: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}" \
              "$VAULT_ADDR/v1/secret/data/worker-node/$ENV/active-slot" \
              | python3 -c "import json,sys; print(json.load(sys.stdin)['data']['data']['ip'])")
          fi
          echo "WORKER_IP=$WORKER_IP" >> $GITHUB_ENV
          echo "worker_ip=$WORKER_IP" >> $GITHUB_OUTPUT

      - name: Fetch SSH key
        run: |
          mkdir -p keys
          curl -sf \
            -H "X-Vault-Token: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}" \
            "$VAULT_ADDR/v1/secret/data/ssh_keys/worker_node_worker" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['data']['data']['private_key'])" \
            > keys/worker_ssh
          chmod 600 keys/worker_ssh

      - name: Install kubectl, kustomize and crane
        run: |
          if ! command -v kubectl &>/dev/null; then
            curl -LO "https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl"
            install -m 0755 kubectl /usr/local/bin/kubectl
            rm kubectl
          fi
          if ! command -v kustomize &>/dev/null; then
            curl -L https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz | tar xz
            install -m 0755 kustomize /usr/local/bin/kustomize
            rm kustomize
          fi
          if ! command -v crane &>/dev/null; then
            curl -sL https://github.com/google/go-containerregistry/releases/download/v0.19.1/go-containerregistry_Linux_x86_64.tar.gz | tar xz -C /tmp crane
            install -m 0755 /tmp/crane /usr/local/bin/crane
          fi

      - name: Setup kubectl
        run: |
          mkdir -p ~/.kube
          ssh -i keys/worker_ssh -o StrictHostKeyChecking=no root@$WORKER_IP \
            "cat /etc/rancher/k3s/k3s.yaml" \
            | sed "s/127.0.0.1/$WORKER_IP/g" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Decom previous deployment if worker changed
        run: |
          PREV_IP=$(curl -sf \
            -H "X-Vault-Token: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}" \
            "$VAULT_ADDR/v1/secret/data/$SERVICE/$ENV/active-deployment" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['data']['data'].get('worker_node_ip',''))" \
            2>/dev/null || echo "")
          if [ -n "$PREV_IP" ] && [ "$PREV_IP" != "$WORKER_IP" ]; then
            echo "Worker changed from $PREV_IP to $WORKER_IP — decommissioning old deployment"
            OLD_KUBECONFIG=$(mktemp)
            ssh -i keys/worker_ssh -o StrictHostKeyChecking=no root@$PREV_IP \
              "cat /etc/rancher/k3s/k3s.yaml" \
              | sed "s/127.0.0.1/$PREV_IP/g" > "$OLD_KUBECONFIG"
            KUBECONFIG="$OLD_KUBECONFIG" kubectl delete namespace $SERVICE --ignore-not-found || true
            rm -f "$OLD_KUBECONFIG"
          fi

      - name: Airgap image push to worker
        run: |
          # VLAN 20 nodes have no internet — pull on runner and stream to worker
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin

          # Ensure the k3s pause sandbox image is present (required to create any pod)
          if ! ssh -i keys/worker_ssh -o StrictHostKeyChecking=no root@$WORKER_IP \
              'k3s ctr images list | grep -q "mirrored-pause:3.6"'; then
            echo "Importing rancher/mirrored-pause:3.6 (required sandbox image)..."
            crane pull --format=tarball rancher/mirrored-pause:3.6 /tmp/pause.tar
            scp -i keys/worker_ssh -o StrictHostKeyChecking=no /tmp/pause.tar root@$WORKER_IP:/tmp/pause.tar
            ssh -i keys/worker_ssh -o StrictHostKeyChecking=no root@$WORKER_IP \
              'k3s ctr images import /tmp/pause.tar && rm /tmp/pause.tar'
            rm /tmp/pause.tar
          fi

          # Import the app image
          crane pull --format=tarball $IMAGE:${{ github.sha }} /tmp/landing-page-image.tar
          scp -i keys/worker_ssh -o StrictHostKeyChecking=no \
            /tmp/landing-page-image.tar root@$WORKER_IP:/tmp/landing-page-image.tar
          ssh -i keys/worker_ssh -o StrictHostKeyChecking=no root@$WORKER_IP \
            'k3s ctr images import /tmp/landing-page-image.tar && rm /tmp/landing-page-image.tar'
          rm /tmp/landing-page-image.tar

      - name: Snapshot CMDB topology into configmap
        # LP-F8: fetch the current CI inventory from CMDB via worker-node's
        # in-cluster NodePort (30092) and write it to
        # manifests/overlays/$ENV/topology.json before kustomize apply. The
        # snapshot gets mounted at /usr/share/nginx/html/topology.json and
        # served same-origin, so the browser doesn't need CMDB reachability
        # or auth.
        #
        # Using the worker as the fetch host (not the runner) keeps this
        # unaffected by any inter-VLAN routing gaps. If CMDB is unreachable
        # the step keeps the placeholder file so the deploy still succeeds;
        # the UI will render "loading topology…" instead of dots.
        run: |
          FILE="manifests/overlays/$ENV/topology.json"
          ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')
          SNAPSHOT=$(ssh -i keys/worker_ssh -o StrictHostKeyChecking=no root@$WORKER_IP \
            "curl -sf --max-time 8 'http://localhost:30092/api/cmdb/topology?env=$ENV_UPPER'" \
            2>/dev/null || echo "")
          if [ -n "$SNAPSHOT" ] && echo "$SNAPSHOT" | python3 -c "import json,sys; json.load(sys.stdin)" 2>/dev/null; then
            echo "$SNAPSHOT" | python3 -m json.tool > "$FILE"
            NODES=$(python3 -c "import json; print(len(json.load(open('$FILE'))['nodes']))")
            echo "CMDB topology snapshot OK: $NODES nodes for $ENV_UPPER → $FILE"
          else
            echo "CMDB unreachable or returned invalid JSON — keeping placeholder $FILE"
            cat "$FILE"
          fi

      - name: Inject Grafana reader token into environment.json
        # LP-F7: prod's environment.json ships with a __GRAFANA_READER_TOKEN__
        # placeholder. Pull the real value from Vault and substitute in place.
        # Dev keeps an empty grafanaToken so the frontend falls back to status-api.
        run: |
          TOKEN=$(curl -sf \
            -H "X-Vault-Token: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}" \
            "$VAULT_ADDR/v1/secret/data/databaes-landing-page/grafana-reader-token" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['data']['data'].get('token',''))" \
            2>/dev/null || echo "")
          FILE="manifests/overlays/$ENV/environment.json"
          if grep -q "__GRAFANA_READER_TOKEN__" "$FILE"; then
            if [ -z "$TOKEN" ]; then
              echo "Placeholder present but Vault returned no token — aborting to avoid shipping the placeholder to the browser."
              exit 1
            fi
            python3 - <<PY
          import json, os
          p = "$FILE"
          with open(p) as f: d = json.load(f)
          d['grafanaToken'] = "$TOKEN"
          with open(p, 'w') as f: json.dump(d, f, indent=2); f.write('\n')
          print(f"Substituted grafanaToken in {p} (token length {len('$TOKEN')})")
          PY
          else
            echo "No Grafana token placeholder in $FILE — nothing to substitute."
          fi

      - name: Create namespace and apply manifests
        run: |
          kubectl create namespace $SERVICE --dry-run=client -o yaml | kubectl apply -f -
          # Force-delete any pods stuck in Terminating from a previous failed rollout
          kubectl delete pods --all -n $SERVICE --force --grace-period=0 2>/dev/null || true
          cd manifests/overlays/$ENV
          kustomize edit set image $IMAGE=$IMAGE:${{ github.sha }}
          kubectl apply -k .

      - name: Open NodePort in worker firewall
        run: |
          # Ensure the NodePort is not blocked by a host firewall on the worker
          ssh -i keys/worker_ssh -o StrictHostKeyChecking=no root@$WORKER_IP \
            "if command -v ufw >/dev/null 2>&1 && ufw status 2>/dev/null | grep -q 'Status: active'; then
               ufw allow $PORT/tcp && echo 'UFW: opened port $PORT'
             fi
             iptables -C INPUT -p tcp --dport $PORT -j ACCEPT 2>/dev/null || \
               ( iptables -I INPUT -p tcp --dport $PORT -j ACCEPT && echo 'iptables: opened port $PORT' )"

      - name: Wait for rollout
        run: |
          # Show pod status before waiting
          kubectl get pods -n $SERVICE -o wide || true
          kubectl rollout status deployment/$SERVICE -n $SERVICE --timeout=300s || {
            echo "=== Rollout timed out — pod diagnostics ==="
            kubectl get pods -n $SERVICE -o wide
            kubectl describe pods -n $SERVICE | grep -A 20 "Events:"
            # List containerd images to verify airgap import
            ssh -i keys/worker_ssh -o StrictHostKeyChecking=no root@$WORKER_IP \
              'k3s ctr images list | grep landing-page' || true
            exit 1
          }
          # Verify the NodePort service is reachable
          echo "=== Service status ==="
          kubectl get svc -n $SERVICE -o wide
          echo "=== NodePort reachability test (from runner) ==="
          curl -sf --max-time 5 http://$WORKER_IP:$PORT/ -o /dev/null -w "HTTP %{http_code}\n" \
            && echo "NodePort 30080 is REACHABLE from runner" \
            || echo "NodePort 30080 UNREACHABLE from runner — k3s iptables rule may need a moment"
          echo "=== NodePort reachability test (from worker itself) ==="
          ssh -i keys/worker_ssh -o StrictHostKeyChecking=no root@$WORKER_IP \
            'curl -sf --max-time 5 http://localhost:30080/ -o /dev/null -w "HTTP %{http_code}\n" && echo "localhost:30080 OK" || echo "localhost:30080 FAILED"'

      - name: Record active deployment
        run: |
          curl -sf \
            -H "X-Vault-Token: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}" \
            -X POST \
            -d "{\"data\":{\"worker_node_ip\":\"$WORKER_IP\"}}" \
            "$VAULT_ADDR/v1/secret/data/$SERVICE/$ENV/active-deployment"

      - name: Cleanup
        if: always()
        run: rm -rf keys ~/.kube/config

  register-dns:
    needs: [deploy]
    runs-on: ubuntu-latest
    env:
      ENV: ${{ github.event_name == 'push' && 'dev' || inputs.env }}
      WORKER_IP: ${{ needs.deploy.outputs.worker_ip }}
    steps:
      - name: Install PyYAML
        run: pip install pyyaml --quiet

      - name: Checkout traefik-gitops
        uses: actions/checkout@v4
        with:
          repository: TomasBFerreira/traefik-gitops
          token: ${{ secrets.GH_PAT }}
          path: traefik-gitops

      - name: Compute hostname
        run: |
          # prod: databaes.net (root domain), dev: dev.databaes.net
          # Service names are env-scoped so dev and prod never share a backend entry
          if [ "$ENV" = "prod" ]; then
            echo "HOSTNAME=databaes.net"                         >> $GITHUB_ENV
            echo "ROUTER_NAME=databaes-landing-page-router"     >> $GITHUB_ENV
            echo "SVC_NAME=databaes-landing-page-service"       >> $GITHUB_ENV
          else
            echo "HOSTNAME=dev.databaes.net"                    >> $GITHUB_ENV
            echo "ROUTER_NAME=dev-router"                       >> $GITHUB_ENV
            echo "SVC_NAME=databaes-landing-page-dev-service"   >> $GITHUB_ENV
          fi

      - name: Upsert Traefik route
        env:
          BACKEND: "http://${{ env.WORKER_IP }}:${{ env.PORT }}"
        run: |
          python3 - <<'EOF'
          import yaml, os

          path = "traefik-gitops/config/dynamic/services.yml"
          with open(path) as f:
              cfg = yaml.safe_load(f) or {}

          hostname  = os.environ["HOSTNAME"]
          router    = os.environ["ROUTER_NAME"]
          svc       = os.environ["SVC_NAME"]
          backend   = os.environ["BACKEND"]

          cfg.setdefault("http", {}).setdefault("routers", {})[router] = {
              "rule": f"Host(`{hostname}`)",
              "service": svc,
              "entryPoints": ["web"],
          }
          cfg["http"].setdefault("services", {})[svc] = {
              "loadBalancer": {"servers": [{"url": backend}]}
          }

          with open(path, "w") as f:
              yaml.dump(cfg, f, default_flow_style=False, allow_unicode=True)

          print(f"Upserted route: {hostname} → {backend}  (svc: {svc})")
          EOF

      - name: Push route update
        working-directory: traefik-gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/dynamic/services.yml
          if git diff --staged --quiet; then
            echo "No route changes to push"
          else
            git commit -m "chore: upsert $SERVICE route ($HOSTNAME → $BACKEND)"
            git push
          fi

      - name: Trigger backfill-dns to update Cloudflare CNAME
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Triggering backfill-dns.yml to update/create Cloudflare CNAME for $HOSTNAME..."
          gh workflow run backfill-dns.yml --repo TomasBFerreira/traefik-gitops \
            && echo "Backfill triggered — https://github.com/TomasBFerreira/traefik-gitops/actions" \
            || echo "Could not trigger backfill (run manually if needed)"
